interface:
  display_name: "Maquette Pages"
  short_description: "Create website page concepts with image_gen, then implement them with approved brand and component references."
  default_prompt: "Use $maquette-pages in experimental concept-first mode when components are not ready: generate separate top, middle, and bottom 16:9 desktop browser screenshot concepts from the approved brand, not one compressed full-page concept; inspect each segment, ask whether to use it, then write .maquette/pages/<page-name>/component-extraction-plan.md before requesting component expansion. For implementation mode, verify reusable component coverage and catalog API readiness by updating .maquette/components/component-coverage-plan.md before requesting any new component artifact; reuse existing components first, extend them when only a variant/state/slot/density/behavior is missing, and request focused 1:1 visual component close-up coverage only for true reusable gaps. Do not request CSS text-on-image component posters unless the user explicitly asks for the legacy CSS-contract route. Check optional QA tooling and ask for an install decision when planned QA is blocked, including partial installs such as missing ajv-formats. Before the first page concept or raster asset image_gen create/edit call, resolve image-worker authorization by asking once when unresolved; do not treat lack of prior subagent authorization as permission to use the main workflow. Before page concept work, detect existing website/app entrypoints; when present, create .maquette/site/site-contract.md and preserve locked shell regions. Generate or revise segment concepts through the authorized image path, inspect them, ask whether to use each segment or make a new one, then only after approval inventory visible regions, write segment layout contracts, page-layout-contract.md, experience-quality-contract.md, and asset-manifest.json before coding. The segment contracts must cover viewport size, section bounds, columns, font-size estimates, line-height, weight, casing, one-line text, wrapping, and overflow. The experience contract must cover generated visual fit, purposeful motion/effects, reduced motion, states, accessibility, performance budgets or static risk review, content hierarchy, brand craft, mobile UX, typography/text-fit QA, font-loading QA, and screenshots capped at 1254x1254 or segmented. QA every category explicitly, including existing-site shell consistency when active, and assemble/approve the final page only after top/middle/bottom segments pass visual QA."
