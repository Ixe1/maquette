interface:
  display_name: "Maquette Pages"
  short_description: "Create website page concepts with image_gen, then implement them with approved brand and component references."
  default_prompt: "Use $maquette-pages to verify component coverage, request focused missing component/composite/navigation/product-card/footer-social sheets when needed, create or revise a page concept image with image_gen, inventory visible concept regions, create an asset manifest, then implement the website page using approved brand and component references. QA concept fidelity, assets, typography, card anatomy, footer fidelity, mobile drawer scrollability, social icons, responsive navigation, and overflow."
