interface:
  display_name: "Maquette Pages"
  short_description: "Create website page concepts with image_gen, then implement them with approved brand and component references."
  default_prompt: "Use $maquette-pages to verify reusable component coverage and catalog API readiness by updating .maquette/components/component-coverage-plan.md before requesting any new component sheet; reuse existing components first, extend them when only a variant/state/slot/density/behavior is missing, and request focused visual component-sheet coverage only for true reusable gaps. Use CSS-contract posters only as optional supplements when text clarification is needed. Check optional QA tooling and ask for an install decision when planned QA is blocked, including partial installs such as missing ajv-formats. Before the first page concept or raster asset image_gen create/edit call, resolve image-worker authorization by asking once when unresolved; do not treat lack of prior subagent authorization as permission to use the main workflow. Before page concept work, detect existing website/app entrypoints; when present, create .maquette/site/site-contract.md and preserve locked shell regions. Generate or revise the page concept through the authorized image path, inspect it, ask whether to use it or make a new one, then only after approval inventory visible regions, write page-layout-contract.md, experience-quality-contract.md, and asset-manifest.json before coding. The experience contract must cover generated visual fit, purposeful motion/effects, reduced motion, states, accessibility, performance budgets or static risk review, content hierarchy, brand craft, and mobile UX. QA every category explicitly, including existing-site shell consistency when active."
