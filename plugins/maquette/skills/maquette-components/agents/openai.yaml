interface:
  display_name: "Maquette Components"
  short_description: "Build a reusable website component library from an approved design system, guided by focused image-generated CSS-contract posters."
  default_prompt: "Use $maquette-components to process focused 1:1 component artifacts sequentially: check optional QA tooling first and ask for an install decision when any planned QA capability is blocked, including partial installs such as missing ajv-formats; before the first component poster/sheet image_gen create/edit call, create or update .maquette/components/component-coverage-plan.md by inspecting the brief, requested pages, existing catalog, contract CSS, component CSS/JS, and replica/gallery examples. Reuse existing components first, extend variants/states/slots/density/behavior when clean, create new reusable components only for true structural gaps, and keep page-specific composites out of the global catalog unless reuse is justified. Resolve image-worker authorization by asking once when unresolved; do not treat lack of prior subagent authorization as permission to use the main workflow. Then generate a focused readable CSS-contract poster by default only for a coverage-plan batch with a strict roughly 8-16 selector allowlist. Transcribe accepted posters into contracts/<batch>.contract.css, build faithful reusable batch replicas, write category-prefixed evidence under .maquette/components/, QA states/accessibility/reduced-motion/performance, and move to the next poster only after review. Generate visual component sheets only when explicitly requested or when the CSS-contract route is documented as blocked. Use bundled Maquette scripts where available."
