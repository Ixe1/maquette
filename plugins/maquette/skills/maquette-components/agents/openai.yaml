interface:
  display_name: "Maquette Components"
  short_description: "Build a reusable website component library from an approved design system, guided by focused 1:1 visual component close-ups."
  default_prompt: "Use $maquette-components to process focused 1:1 component artifacts sequentially: check optional QA tooling first and ask for an install decision when any planned QA capability is blocked, including partial installs such as missing ajv-formats; before the first component close-up or legacy poster image_gen create/edit call, create or update .maquette/components/component-coverage-plan.md by inspecting the brief, requested pages, approved page concept and component-extraction-plan when present, existing catalog, contract CSS when present, component CSS/JS, and replica/gallery examples. Reuse existing components first, extend variants/states/slots/density/behavior when clean, create new reusable components only for true structural gaps, and keep page-specific composites out of the global catalog unless reuse is justified. Resolve image-worker authorization by asking once when unresolved; do not treat lack of prior subagent authorization as permission to use the main workflow. Then use image_gen edit mode on the approved concept, optionally with shared/template-images/component-closeup-template-v1.png as a neutral framing scaffold, to create a focused visual component close-up by default for a justified coverage-plan batch. Do not ask image_gen to render CSS text on component images unless the user explicitly requests the legacy CSS-contract route. Build faithful reusable batch replicas, screenshot-match each close-up with evidence capped at 1254x1254 or segmented, write category-prefixed evidence under .maquette/components/, QA visual fidelity/states/accessibility/reduced-motion/performance, and move to the next artifact only after review. Use bundled Maquette scripts where available."
