interface:
  display_name: "Maquette"
  short_description: "Run the full staged image-guided website workflow."
  default_prompt: "Use $maquette to run the experimental concept-first Maquette workflow: before the first Maquette image_gen create/edit call, resolve image-worker authorization by asking once when unresolved; do not treat lack of prior subagent authorization as permission to use the main workflow. Preserve brand-board/page-concept approval gates unless explicitly unattended. Create any missing focused foundational brand kit, then generate a tall portrait page concept for discovery, inspect it, and ask whether to use it. After approval, create .maquette/pages/<page-name>/component-extraction-plan.md, then create or update .maquette/components/component-coverage-plan.md by inspecting the approved concept, extraction plan, brief, requested pages, existing catalog, contracts when present, component CSS/JS, and replica/gallery examples. Reuse existing components first, extend variants/states/slots/density/behavior when clean, create new reusable components only for true structural gaps, and keep page-specific composites out of the global catalog unless reuse is justified. Use image_gen edit mode on the approved concept to create focused 1:1 visual component close-ups by default for justified coverage-plan batches; do not ask image_gen to render CSS text on component images unless the user explicitly requests the legacy CSS-contract route. Implement and screenshot-match one close-up at a time before moving on, with visual screenshots capped at 1024x1024 or segmented. Before page implementation, detect existing-site integration mode and preserve the canonical shell. Then create the requested page with approved concept-region inventory, page layout contract, experience quality contract, asset manifest, generated visual fit checks, purposeful motion/reduced-motion planning, interaction states, accessibility/performance/content/brand/mobile QA, segmented screenshot review, site-shell consistency when active, and final pass/fail review."
