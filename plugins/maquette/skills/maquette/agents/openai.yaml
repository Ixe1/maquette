interface:
  display_name: "Maquette"
  short_description: "Run the full staged image-guided website workflow."
  default_prompt: "Use $maquette to run the experimental concept-first Maquette workflow: before the first Maquette image_gen create/edit call, resolve image-worker authorization by asking once when unresolved; do not treat lack of prior subagent authorization as permission to use the main workflow. Preserve brand-board/page-concept approval gates unless explicitly unattended. Create any missing focused foundational brand kit, preferably using shared/template-images/brand-kit-template-v1.png as a neutral edit scaffold when helpful, and create .maquette/brand/fonts.css when custom fonts are approved. Then generate separate top, middle, and bottom 16:9 desktop browser screenshot page concepts, not one compressed full-page concept; inspect each segment and ask whether to use it. After segment approval, create .maquette/pages/<page-name>/component-extraction-plan.md, then create or update .maquette/components/component-coverage-plan.md by inspecting the approved segments, extraction plan, brief, requested pages, existing catalog, contracts when present, component CSS/JS, and replica/gallery examples. Reuse existing components first, extend variants/states/slots/density/behavior when clean, create new reusable components only for true structural gaps, and keep page-specific composites out of the global catalog unless reuse is justified. Use image_gen edit mode on the approved segments, optionally with shared/template-images/component-closeup-template-v1.png as a neutral framing scaffold, to create focused 1:1 visual component close-ups by default for justified coverage-plan batches; do not ask image_gen to render CSS text on component images unless the user explicitly requests the legacy CSS-contract route. Implement and screenshot-match one close-up at a time before moving on, with visual screenshots capped at 1254x1254 or segmented. Before page implementation, detect existing-site integration mode and preserve the canonical shell. Then create segment layout contracts, concept-region inventory, page layout contract, experience quality contract, asset manifest, generated visual fit checks, purposeful motion/reduced-motion planning, interaction states, typography/text-fit QA, font-loading QA, accessibility/performance/content/brand/mobile QA, segmented screenshot review, site-shell consistency when active, and final pass/fail review. Assemble/approve the final page only after top, middle, and bottom segments pass visual QA."
