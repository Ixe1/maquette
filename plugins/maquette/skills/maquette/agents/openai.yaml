interface:
  display_name: "Maquette"
  short_description: "Run the full staged image-guided website workflow."
  default_prompt: "Use $maquette to run the full Maquette workflow: before the first Maquette image_gen create/edit call, resolve image-worker authorization by asking once when unresolved; do not treat lack of prior subagent authorization as permission to use the main workflow. Preserve brand-board/page-concept approval gates unless explicitly unattended. Create any missing focused foundational brand kit, then create or update .maquette/components/component-coverage-plan.md before any component poster by inspecting the brief, requested pages, existing catalog, contracts, component CSS/JS, and replica/gallery examples. Reuse existing components first, extend variants/states/slots/density/behavior when clean, create new reusable components only for true structural gaps, and keep page-specific composites out of the global catalog unless reuse is justified. Generate focused readable CSS-contract posters by default only for justified coverage-plan batches with strict roughly 8-16 selector allowlists, transcribe them into contract CSS, and write/review concrete batch artifacts before moving on. Generate visual component sheets only when explicitly requested or when the CSS-contract route is blocked. Before page work, detect existing-site integration mode and preserve the canonical shell. Then create the requested page with approved concept-region inventory, page layout contract, experience quality contract, asset manifest, generated visual fit checks, purposeful motion/reduced-motion planning, interaction states, accessibility/performance/content/brand/mobile QA, site-shell consistency when active, and final pass/fail review."
