interface:
  display_name: "Maquette"
  short_description: "Run the full staged image-guided website workflow."
  default_prompt: "Use $maquette to run the full Maquette workflow: before the first Maquette image_gen create/edit call, resolve image-worker authorization. If subagents were not already explicitly authorized and the user did not explicitly decline or request no questions/no pauses/skip approvals, ask once whether to use Maquette image-worker subagents; do not say that lack of explicit authorization means images will be generated in the main workflow. When authorized, create or edit images through the image-worker handoff, inspect returned project-local image paths, and ask for user approval after brand-board and page-concept images before deriving downstream artifacts. Do not infer unattended mode from requests for one pass, a final homepage, a fresh disposable test, or a full workflow; only skip questions when the user explicitly asks for no questions/no pauses/skip approvals. Create any missing focused foundational brand kit, then process component coverage sequentially by checking optional QA tooling and asking for an install decision when any planned QA capability is blocked, including partial installs such as missing ajv-formats; generate one focused 1:1 text-only CSS-contract poster at a time by default, transcribe it into a contract CSS bridge file, and write concrete category-prefixed componentized batch replica/reference, CSS/JS, catalog, and screenshot-reviewed artifacts before moving to the next needed artifact. Generate visual component sheets only when explicitly requested or when the CSS-contract route is documented as blocked. Before page concept or implementation work, detect existing website/app entrypoints; when present, create .maquette/site/site-contract.md, preserve the canonical existing shell, reuse existing CSS/JS entrypoints, and prevent page-local duplication of global nav/footer/newsletter/tokens/shared behavior. Then create the requested page or screen with approved concept-region inventory, page layout contract, asset manifest, site-shell consistency QA when existing-site mode is active, and fidelity QA."
